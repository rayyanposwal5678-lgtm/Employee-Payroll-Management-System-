## Question 2: System Functionality

### 1. What problem does your system solve?
The **Employee Payroll Management System (EPMS)** solves the problem of inefficient and error-prone manual management of employee records and salary calculations. It centralizes employee data, automates complex payroll computations (factoring in allowances, deductions, and loans), and provides a secure, role-based interface for both Admins (to manage the organization) and Employees (to view their own status and slips).

### 2. Describe two key functionalities of your system.
1.  **Automated Payroll Generation**: The system automatically aggregates an employee's detailed financial data—including their `Designation`'s basic salary, individual `Payroll_Allowance`s, and `Payroll_Deduction`s—to calculate the final **Net Salary**. It generates a permanent `Payroll` record and visualizes monthly trends for the admin.
2.  **Role-Based Access Control (RBAC)**: The system strictly distinguishes between **Admins** and **Employees**. 
    *   **Admins** have a comprehensive Dashboard to create employees, manage departments, and issue loans.
    *   **Employees** have a restricted, read-only interface where they can securely view their own Profile (`employee_profile`), Salary History (`employee_salary`), and Payslips, ensuring data privacy.

### 3. Explain how the database is used to support these functionalities.
The relational database (SQLite/PostgreSQL) underpins these features by maintaining data integrity through **Foreign Keys** and **cascading behaviors**:
*   **Normalization**: `Designation` and `Department` are stored as separate tables linked to `Employee` via Foreign Keys. This ensures that if a Department's name changes, it reflects for all associated employees instantly.
*   **Data Integrity**: The `Payroll` table links to `Employee` with `on_delete=models.CASCADE`. This ensures that payroll records are inextricably tied to valid employee records.
*   **Aggregation**: To calculate "Total Expenses" for the dashboard charts, the database performs efficient aggregations (Sum/Count) directly on the `Payroll` and `Employee` tables rather than processing loops in Python.
